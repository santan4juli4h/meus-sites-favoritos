<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Sites Favoritos</title>

    <style>

        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffd6e7, #ffeaf4);
        }

        header{
            background-color: #ff4f93;
            color: white;
            text-align: center;
            padding: 25px;
            font-size: 30px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .sub{
            text-align: center;
            color: #880e4f;
            margin-top: 15px;
            font-size: 18px;
        }

        .container{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding: 30px;
            max-width: 1000px;
            margin: auto;
        }

        .card{
            background-color: white;
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover{
            transform: translateY(-8px);
        }

        .card img{
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            transition: 0.3s;
        }

        .card img:hover{
            transform: scale(1.05);
        }

        .card h2{
            color: #c2185b;
        }

        .btn{
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #ff4f93;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover{
            background-color: #c2185b;
        }

        footer{
            text-align: center;
            padding: 20px;
            background-color: #ff4f93;
            color: white;
            margin-top: 30px;
        }

    </style>

</head>

<body>

    <header>
        🌸 Meus Sites Favoritos por: Juliah santana🌸
    </header>

    <p class="sub">
        Meus apps e sites favoritos 💖
    </p>

    <div class="container">

        <!-- SPOTIFY -->
        <div class="card">
            <h2>Spotify 🎵</h2>

            <a href="https://open.spotify.com/" target="_blank">
                <img src="spotify.png">
            </a>

            <a class="btn" href="https://open.spotify.com/" target="_blank">
                Acessar
            </a>
        </div>

        <!-- PINTEREST -->
        <div class="card">
            <h2>Pinterest 📌</h2>

            <a href="https://www.pinterest.com/" target="_blank">
                <img src="pinterest.png">
            </a>

            <a class="btn" href="https://www.pinterest.com/" target="_blank">
                Acessar
            </a>
        </div>

        <!-- INSTAGRAM -->
        <div class="card">
            <h2>Instagram 📸</h2>

            <a href="https://www.instagram.com/" target="_blank">
                <img src="instagram.png">
            </a>

            <a class="btn" href="https://www.instagram.com/" target="_blank">
                Acessar
            </a>
        </div>

        <!-- YOUTUBE -->
        <div class="card">
            <h2>YouTube ▶</h2>

            <a href="https://www.youtube.com/" target="_blank">
                <img src="youtube.png">
            </a>

            <a class="btn" href="https://www.youtube.com/" target="_blank">
                Acessar
            </a>
        </div>

        <!-- ROBLOX -->
        <div class="card">
            <h2>Roblox 🎮</h2>

            <a href="https://www.roblox.com/" target="_blank">
                <img src="roblox.png">
            </a>

            <a class="btn" href="https://www.roblox.com/" target="_blank">
                Acessar
            </a>
        </div>

    </div>

    <footer>
        Desenvolvido por Juliah Santana 💖 - 2026
    </footer>

</body>

</html>
